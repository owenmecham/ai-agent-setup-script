agent:
  name: "Murph"
  model: "sonnet"
  max_budget_per_message_usd: 0.50
  timezone: "America/Denver"
  web_search: true

database:
  url: "postgresql://localhost:5432/murph"

embedding:
  provider: "ollama"
  model: "nomic-embed-text"
  ollama_url: "http://localhost:11434"

security:
  dashboard_port: 3141
  approval_defaults:
    gmail.send: require
    gmail.read: auto
    imessage.send: require
    telegram.send: notify
    bop.*: require
    mcp.*: auto
    mcp.google.gmail.users.messages.send: require
    mcp.google.gmail.users.drafts.send: require
    mcp.google.calendar.events.insert: notify
    mcp.google.calendar.events.delete: require
    mcp.google.drive.files.delete: require
    mcp.google.drive.files.create: notify
    playwright.*: notify
    cloudflare.deploy: require
    creator.*: require
    scheduler.create: notify
    scheduler.list: auto
    scheduler.delete: auto
    scheduler.update: auto
    hubspot.*: notify
    gohighlevel.*: notify
    profile.update: auto
    knowledge.ingest: auto
    knowledge.delete: require

channels:
  imessage:
    enabled: true
    poll_interval_ms: 1000
    chat_db_path: "~/Library/Messages/chat.db"
    allowed_senders: []  # phone numbers or emails; empty = allow all
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    allowed_user_ids: []

knowledge:
  sources:
    obsidian:
      enabled: false
      vault_path: ""
      watch: true
    granola:
      enabled: false
    plaud:
      enabled: false

mcp_servers:
  - name: "playwright"
    transport: "stdio"
    command: "npx"
    args: ["@playwright/mcp@latest"]
  - name: "google"
    transport: "stdio"
    command: "gws"
    args: ["mcp"]

integrations:
  bop:
    enabled: false
  gohighlevel:
    enabled: false
  hubspot:
    enabled: false
  playwright:
    enabled: true
  cloudflare:
    enabled: false

creator:
  enabled: false
  deploy_target: "cloudflare"
  project_prefix: "murph-gen"

scheduler:
  enabled: true

acknowledgment:
  enabled: true
  style: pool            # 'pool' | 'static' | 'none'
  static_message: "Received, thinking..."
  excluded_channels:
    - dashboard

memory:
  short_term_buffer_size: 50
  flush_interval_seconds: 30
  semantic_search_limit: 5
  knowledge_search_limit: 5
  max_context_tokens: 4000

logging:
  level: "info"
  file: "~/.murph/murph.log"
