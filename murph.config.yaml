agent:
  name: "Murph"
  model: "sonnet"
  max_budget_per_message_usd: 0.50
  timezone: "America/Denver"
  web_search: true

database:
  url: "postgresql://localhost:5432/murph"

embedding:
  provider: "ollama"
  model: "nomic-embed-text"
  ollama_url: "http://localhost:11434"

security:
  dashboard_port: 3141
  approval_defaults:
    gmail.send: require
    gmail.read: auto
    imessage.send: require
    telegram.send: notify
    bop.*: require
    mcp.*: auto
    google.gmail.search: auto
    google.gmail.get: auto
    google.gmail.modify: notify
    google.gmail.archive: notify
    google.gmail.send: require
    google.gmail.draft: notify
    google.gmail.reply: require
    google.gmail.labels.list: auto
    google.gmail.labels.create: notify
    google.calendar.list: auto
    google.calendar.create: notify
    google.tasks.list: auto
    google.tasks.create: notify
    google.tasks.update: notify
    google.tasks.complete: notify
    google.drive.list: auto
    google.drive.get: auto
    playwright.*: notify
    cloudflare.deploy: require
    creator.*: require
    scheduler.create: notify
    scheduler.list: auto
    scheduler.delete: auto
    scheduler.update: auto
    hubspot.*: notify
    gohighlevel.*: notify
    profile.update: auto
    knowledge.ingest: auto
    knowledge.delete: require
    email-maintenance.run: auto
    email-maintenance.mark_read: notify
    email-maintenance.archive: notify
    email-maintenance.apply_label: auto
    email-maintenance.create_task: notify
    email-maintenance.reply: require
    email-maintenance.forward: notify

channels:
  imessage:
    enabled: true
    poll_interval_ms: 1000
    chat_db_path: "~/Library/Messages/chat.db"
    allowed_senders: []  # phone numbers or emails; empty = allow all
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    allowed_user_ids: []

knowledge:
  sources:
    obsidian:
      enabled: false
      vault_path: ""
      watch: true
    granola:
      enabled: false
    plaud:
      enabled: false

mcp_servers:
  - name: "playwright"
    transport: "stdio"
    command: "npx"
    args: ["@playwright/mcp@latest"]
  - name: "plaud"
    transport: "stdio"
    command: "plaud-mcp"

integrations:
  google:
    enabled: true
  bop:
    enabled: false
  gohighlevel:
    enabled: false
  hubspot:
    enabled: false
  playwright:
    enabled: true
  cloudflare:
    enabled: false

creator:
  enabled: false
  deploy_target: "cloudflare"
  project_prefix: "murph-gen"

scheduler:
  enabled: true

email_maintenance:
  enabled: false
  goal: ""
  model: "haiku"
  cadence: "1h"
  next_steps: ""
  gmail_query: ""
  lookback_window: "24h"
  max_emails_per_run: 50
  only_unread: true
  scan_labels: []
  snippet_length: 1000
  mark_read: false
  archive: false
  apply_label: ""
  auto_tasking: false
  task_list: "@default"
  reply_enabled: false
  reply_mode: "draft"
  forward_to: ""
  calendar_aware: false
  max_budget_per_run_usd: 0.25
  batch_size: 20
  run_window_start: ""
  run_window_end: ""
  notify_channel: "dashboard"
  notify_on: "matches_only"
  privacy_keywords: []

auto_update:
  enabled: true
  check_interval_hours: 1
  install_hour: 1  # 1 AM local time

acknowledgment:
  enabled: true
  style: pool            # 'pool' | 'static' | 'none'
  static_message: "Received, thinking..."
  excluded_channels:
    - dashboard

memory:
  short_term_buffer_size: 50
  flush_interval_seconds: 30
  semantic_search_limit: 5
  knowledge_search_limit: 5
  max_context_tokens: 4000

logging:
  level: "info"
  file: "~/.murph/murph.log"
